<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Bebas Neue", "sans-serif"],
              body: ["DM Sans", "sans-serif"],
            },
            colors: {
              cream: "#f5f2ee",
              ink: "#0f0f0f",
              lime: "#c8ff00",
            },
          },
        },
      };
    </script>
    <title>Welcome — Snap Fitness</title>
  </head>

  <body class="bg-gray-800 font-body">
    <header>
      <nav class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-10 py-4 bg-cream/20 backdrop-blur-md border-b border-black/10 h-[150px]">
        <div class="w-[150px]">
          <a href="index.html"><img src="IMG/snapFitness.png" alt="LOGO" /></a>
        </div>
        <div class="hidden md:flex gap-8 items-center">
          <a href="" class="text-sm font-medium text-white hover:text-yellow-400 transition-colors">Home</a>
          <a href="" class="text-sm font-medium text-white hover:text-yellow-400 transition-colors">Equipment</a>
          <a href="" class="text-sm font-medium text-white hover:text-yellow-400 transition-colors">How it work</a>
          <a href="contact.html" class="text-sm font-medium text-white hover:text-yellow-400 transition-colors">Contact</a>
        </div>
      </nav>
    </header>

    <div class="min-h-screen flex items-center justify-center pt-20 pb-20">
      <div class="bg-white/20 p-12 rounded-xl w-full max-w-lg text-center">
        
        <!-- Blue tick circle -->
        <div class="flex items-center justify-center mb-6">
          <div class="w-24 h-24 rounded-full bg-blue-500 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </div>
        </div>

        <!-- Thank you text -->
        <h1 class="text-white text-3xl font-bold mb-3">Thank You for Joining!</h1>
        <p class="text-yellow-400 text-lg font-semibold mb-2">Welcome to Snap Fitness 💪</p>
        <p class="text-gray-400 text-sm leading-relaxed mb-8">
          Your membership request has been received. Our team will contact you shortly to confirm your registration.
        </p>

        <!-- Divider -->
        <div class="h-px bg-white/10 mb-8"></div>

        <!-- Back button -->
        <a href="index.html">
          <button class="w-full bg-yellow-400 text-gray-900 font-semibold py-3 rounded-md hover:bg-yellow-300 hover:scale-105 hover:shadow-lg hover:shadow-yellow-400/30 transition-all duration-300">
            Back to Home
          </button>
        </a>

      </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-ink text-white/40 font-bold px-10 py-4 flex justify-between items-center text-sm">
      <div class="font-display text-cream text-xl tracking-widest">
        Snap <span class="text-yellow-400">Fitness</span>
      </div>
      <div>© 2026 Snap Fitness Gym. All rights reserved.</div>
    </footer>
  </body>
</html>
